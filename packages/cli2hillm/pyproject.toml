[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cli2hillm"
version = "0.1.0"
description = "Shell passthrough adapter for dsl2hillm"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = ["dsl2hillm>=0.1.0"]

[project.scripts]
cli2hillm = "cli2hillm.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
dsl2hillm = { workspace = true }
