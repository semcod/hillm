[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsl2hillm"
version = "0.1.0"
description = "HILLM control DSL with JSON Schema validation and CQRS bus"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "hillm>=0.1.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
dsl2hillm = "dsl2hillm.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
hillm = { workspace = true }

[tool.setuptools.package-data]
"dsl2hillm" = ["schema/commands/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
